name: Agent setup
description: >-
  Shared dispatch/recover prologue: checkout, claim the issue, install Nix,
  build the agent image, export the plumbing env (RUNTIME + secrets) every
  spindrift subcommand reads, and resolve the bot git identity. Knob values
  (repo, base branch, bot identity) are surfaced as step outputs so callers
  pass them to spindrift as --flags rather than ambient env (ADR 0020: knob
  env overrides are deprecated). Both agent-dispatch.yml and agent-recover.yml
  call this so the claim/install/build steps and the git bot identity literal
  exist exactly once.

inputs:
  gh-token:
    description: Token for gh CLI calls (claim step and exported GH_TOKEN)
    required: true
  claude-oauth-token:
    description: Exported as CLAUDE_CODE_OAUTH_TOKEN for the spindrift box
    required: true
  issue-number:
    description: Issue number to claim
    required: true
  repo:
    description: owner/repo slug for the claim step's gh calls
    required: true
  claim-add-label:
    description: Label to add when claiming the issue
    required: true
  claim-remove-labels:
    description: Space-separated labels to remove when claiming the issue
    required: true
  git-user-name:
    description: >-
      Bot git user.name. Empty falls back to the default baked into this
      action's "Export shared env" step, the sole definition of that literal.
    required: false
    default: ""
  git-user-email:
    description: >-
      Bot git user.email. Empty falls back to the default baked into this
      action's "Resolve bot identity" step, the sole definition of that literal.
    required: false
    default: ""

outputs:
  git-user-name:
    description: >-
      Resolved bot git user.name (the git-user-name input, or the baked
      default). Callers pass it to spindrift as --git-user-name.
    value: ${{ steps.identity.outputs.git-user-name }}
  git-user-email:
    description: >-
      Resolved bot git user.email (the git-user-email input, or the baked
      default). Callers pass it to spindrift as --git-user-email.
    value: ${{ steps.identity.outputs.git-user-email }}

runs:
  using: composite
  steps:
    # No checkout step here: the calling workflow must check out the repo
    # before this `uses: ./.github/actions/agent-setup` step runs, since
    # GitHub resolves and loads this action.yml from the checked-out tree.

    # $GITHUB_ENV persists across the rest of the job. Only RUNTIME (a nix
    # plumbing artifact, not a knob) and the secrets live here — knob values
    # (repo, base branch, bot identity) are surfaced as outputs below and
    # passed as --flags, since ambient knob env now draws a deprecation
    # warning (ADR 0020). Exported before the build step below: spindrift's
    # build() reads RUNTIME directly and fails if it's unset.
    - name: Export shared env
      shell: bash
      run: |
        echo "RUNTIME=docker" >> "$GITHUB_ENV"
        echo "GH_TOKEN=${{ inputs.gh-token }}" >> "$GITHUB_ENV"
        echo "CLAUDE_CODE_OAUTH_TOKEN=${{ inputs.claude-oauth-token }}" >> "$GITHUB_ENV"

    # Resolve the bot identity once — the sole definition of the default
    # literal — and expose it as outputs the calling workflow splices into its
    # `nix run . -- <cmd> --git-user-name … --git-user-email …` invocation.
    - name: Resolve bot identity
      id: identity
      shell: bash
      run: |
        echo "git-user-name=${{ inputs.git-user-name || 'spindrift-agent' }}" >> "$GITHUB_OUTPUT"
        echo "git-user-email=${{ inputs.git-user-email || 'spindrift-agent@users.noreply.github.com' }}" >> "$GITHUB_OUTPUT"

    # Claim up front, before nix install and the ~2m40s build, so ownership
    # is atomic and visible the instant the runner has the repo. Targets
    # only the triggering issue: never scans or strips labels across other
    # issues.
    - name: Claim the issue
      shell: bash
      run: |
        remove_args=()
        for label in ${{ inputs.claim-remove-labels }}; do
          remove_args+=(--remove-label "$label")
        done
        gh issue edit "${{ inputs.issue-number }}" \
          --repo "${{ inputs.repo }}" \
          --add-label "${{ inputs.claim-add-label }}" \
          "${remove_args[@]}"

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v16

    # ~2m40s cold on a GitHub runner (nixpkgs closure is substituted, not compiled).
    - name: Build the agent image
      shell: bash
      run: nix run . -- build
