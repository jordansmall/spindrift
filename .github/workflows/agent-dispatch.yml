name: Agent dispatch

# Adding the `agent-trigger` label to an issue fires one dogfood run against it:
# claim the issue (swap `agent-trigger` -> `agent-in-progress` up front), build
# the image, then drain that single issue (open PR, poll checks, rebase-merge on
# green). The claim clears `agent-trigger` before any build work, so the label
# self-clears and will not re-fire.
on:
  issues:
    types: [labeled]

# Serialise per issue only: two labelings of the SAME issue queue behind each
# other (no double-dispatch), but different issues run concurrently. Agent boxes
# share one Claude rate-limit window — with repo-wide serialisation removed, the
# operator is responsible for not triggering more issues than that window allows.
concurrency:
  group: agent-dispatch-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    if: github.event.label.name == 'agent-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      # The claim step (inside agent-setup) swaps the issue onto
      # agent-in-progress before the build, so the launcher targets it by
      # number rather than a label query. LABEL still names the in-progress
      # label so dispatchWave skips the redundant re-claim of an already-claimed
      # issue.
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      LABEL: agent-in-progress
      MAX_JOBS: "1"
    steps:
      # Checkout must precede the local composite step below: GitHub resolves
      # ./.github/actions/agent-setup from the checked-out tree.
      - uses: actions/checkout@v4

      # Claim (agent-trigger -> agent-in-progress, up front so ownership is
      # atomic before the ~2m40s build), Install Nix, and build — plus the
      # shared env block (RUNTIME, REPO_SLUG, BASE_BRANCH, tokens, bot
      # identity) written to $GITHUB_ENV for every step below. Auth is the
      # worker GitHub App (SPINDRIFT_AGENT_WORKER_APP_*), granted Issues RW,
      # Contents RW, Pull requests RW, Workflows RW, Checks R, Commit statuses
      # R, Metadata R — the default GITHUB_TOKEN is not enough (the launcher
      # merges PRs). Minting the App below yields a short-lived installation
      # token on a per-installation rate-limit bucket, isolated from any
      # personal PAT. The token expires ~1h after minting; the launcher
      # re-mints it before each expiry from the App creds passed to the
      # dispatch step below, so a Box that outlives the initial token still
      # merges cleanly (issue #1027).
      - name: Mint worker App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SPINDRIFT_AGENT_WORKER_APP_ID }}
          private-key: ${{ secrets.SPINDRIFT_AGENT_WORKER_APP_PRIVATE_KEY }}

      - name: Agent setup
        uses: ./.github/actions/agent-setup
        with:
          gh-token: ${{ steps.app-token.outputs.token }}
          claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          repo: ${{ github.repository }}
          base-branch: ${{ github.event.repository.default_branch }}
          claim-add-label: agent-in-progress
          # Strip every other lifecycle label, not just the trigger and
          # ready-for-agent: a re-triggered issue may still carry a stale
          # terminal label (agent-complete / agent-failed) or a leftover
          # agent-recover, and the claim must land it cleanly on
          # agent-in-progress regardless of what it was wearing before.
          claim-remove-labels: agent-trigger ready-for-agent agent-recover agent-complete agent-failed
          git-user-name: ${{ vars.AGENT_GIT_USER_NAME }}
          git-user-email: ${{ vars.AGENT_GIT_USER_EMAIL }}

      # The App creds are handed to the launcher host (not into any Box —
      # they are boxEnv=false secrets) so it re-mints the installation token
      # before each ~1h expiry and republishes GH_TOKEN, keeping a long run's
      # terminal gh operations (merge, label, comment) alive (issue #1027).
      # The private key never leaves the runner.
      - name: Dispatch the labeled issue
        env:
          SPINDRIFT_AGENT_WORKER_APP_ID: ${{ secrets.SPINDRIFT_AGENT_WORKER_APP_ID }}
          SPINDRIFT_AGENT_WORKER_APP_PRIVATE_KEY: ${{ secrets.SPINDRIFT_AGENT_WORKER_APP_PRIVATE_KEY }}
        run: nix run . -- dispatch

      # The launcher parses the two blocker formats and, when this claimed issue
      # is blocked by an unmet dependency, drops logs/blocked.txt naming the
      # blockers instead of working it. Undo the up-front claim (back to
      # ready-for-agent) and say why. No recovery — the operator re-triggers once
      # the blocker resolves. always() so a failed build (no marker) is a no-op.
      - name: Release the claim if blocked
        if: always()
        run: |
          [ -f logs/blocked.txt ] || exit 0
          blockers=$(cat logs/blocked.txt)
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "🚧 Agent made no changes: this issue is blocked by ${blockers} (not yet \`agent-complete\` or closed). Released back to \`ready-for-agent\`; re-trigger once the blocker is resolved."
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --add-label ready-for-agent \
            --remove-label agent-in-progress

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.event.issue.number }}
          path: logs/
          if-no-files-found: ignore
