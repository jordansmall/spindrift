name: Agent dispatch

# Adding the `agent-trigger` label to an issue fires one dogfood run against it:
# claim the issue (swap `agent-trigger` -> `agent-in-progress` up front), build
# the image, then drain that single issue (open PR, poll checks, rebase-merge on
# green). The claim clears `agent-trigger` before any build work, so the label
# self-clears and will not re-fire.
on:
  issues:
    types: [labeled]

# Serialise per issue only: two labelings of the SAME issue queue behind each
# other (no double-dispatch), but different issues run concurrently. Agent boxes
# share one Claude rate-limit window — with repo-wide serialisation removed, the
# operator is responsible for not triggering more issues than that window allows.
concurrency:
  group: agent-dispatch-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    if: github.event.label.name == 'agent-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      # nix run .#run reads these directly; env wins over the image's baked defaults.
      RUNTIME: docker
      # The claim step below swaps the issue onto agent-in-progress before the
      # build, so the launcher targets it by number rather than a label query.
      # LABEL still names the in-progress label so fanOut skips the redundant
      # re-claim of an already-claimed issue.
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      LABEL: agent-in-progress
      MAX_JOBS: "1"
      REPO_SLUG: ${{ github.repository }}
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      GIT_USER_NAME: ${{ vars.AGENT_GIT_USER_NAME || 'spindrift-agent' }}
      GIT_USER_EMAIL: ${{ vars.AGENT_GIT_USER_EMAIL || 'spindrift-agent@users.noreply.github.com' }}
      # Fine-grained PAT scoped to this repo: Issues RW, Contents RW, Pull requests RW,
      # Metadata R. The default GITHUB_TOKEN is not enough (the launcher merges PRs).
      GH_TOKEN: ${{ secrets.SPINDRIFT_GH_TOKEN }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      MERGE_MODE: immediate
    steps:
      - uses: actions/checkout@v4

      # Claim the issue up front — before nix install and the ~2m40s build — so
      # ownership is atomic and visible the instant the runner has the repo:
      # nothing else can grab it during the install or build window. Targets
      # only the triggering issue: never scans or strips ready-for-agent across
      # other issues (a local dogfood run drains that pool and must be left
      # untouched).
      - name: Claim the issue
        run: |
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --add-label agent-in-progress \
            --remove-label agent-trigger \
            --remove-label ready-for-agent

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      # ~2m40s cold on a GitHub runner (nixpkgs closure is substituted, not compiled).
      - name: Build the agent image
        run: nix run .#build

      - name: Dispatch the labeled issue
        run: nix run .#run

      # The launcher parses the two blocker formats and, when this claimed issue
      # is blocked by an unmet dependency, drops logs/blocked.txt naming the
      # blockers instead of working it. Undo the up-front claim (back to
      # ready-for-agent) and say why. No recovery — the operator re-triggers once
      # the blocker resolves. always() so a failed build (no marker) is a no-op.
      - name: Release the claim if blocked
        if: always()
        run: |
          [ -f logs/blocked.txt ] || exit 0
          blockers=$(cat logs/blocked.txt)
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "🚧 Agent made no changes: this issue is blocked by ${blockers} (not yet \`agent-complete\` or closed). Released back to \`ready-for-agent\`; re-trigger once the blocker is resolved."
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --add-label ready-for-agent \
            --remove-label agent-in-progress

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.event.issue.number }}
          path: logs/
          if-no-files-found: ignore
