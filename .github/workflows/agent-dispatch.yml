name: Agent dispatch

# Adding the `agent-trigger` label to an issue fires one dogfood run against it:
# build the image, drain that single issue (open PR, poll checks, rebase-merge on
# green). The launcher swaps `agent-trigger` off the issue when it claims the work,
# so the label self-clears and will not re-fire.
on:
  issues:
    types: [labeled]

# Serialise repo-wide: agent boxes and any interactive session share one Claude
# rate-limit window, so never let two labelings run concurrently. Queue, don't cancel.
concurrency:
  group: agent-dispatch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    if: github.event.label.name == 'agent-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      # nix run .#run reads these directly; env wins over the image's baked defaults.
      RUNTIME: docker
      LABEL: agent-trigger
      MAX_JOBS: "1"
      REPO_SLUG: ${{ github.repository }}
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      GIT_USER_NAME: ${{ vars.AGENT_GIT_USER_NAME || 'spindrift-agent' }}
      GIT_USER_EMAIL: ${{ vars.AGENT_GIT_USER_EMAIL || 'spindrift-agent@users.noreply.github.com' }}
      # Fine-grained PAT scoped to this repo: Issues RW, Contents RW, Pull requests RW,
      # Metadata R. The default GITHUB_TOKEN is not enough (the launcher merges PRs).
      GH_TOKEN: ${{ secrets.SPINDRIFT_GH_TOKEN }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      # ~2m40s cold on a GitHub runner (nixpkgs closure is substituted, not compiled).
      - name: Build the agent image
        run: nix run .#build

      - name: Dispatch the labeled issue
        run: nix run .#run

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.event.issue.number }}
          path: logs/
          if-no-files-found: ignore
