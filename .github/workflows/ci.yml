name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: flake check + image realize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      # Fork-friendly binary cache: /nix rides the GitHub Actions cache, so no
      # external service or credentials. PRs (including from forks) restore
      # from base/default-branch caches; a miss degrades to a cold build.
      - name: Restore and save the nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', 'go.sum') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G

      # shellcheck, the bats suite, and the eval-only equivalence checks.
      - name: nix flake check
        run: nix flake check --print-build-logs

      # Realize the Linux OCI image natively — the one thing the checks only
      # assert at eval time. On a Linux runner this needs no podman fallback.
      - name: Build the agent image
        run: nix build .#packages.x86_64-linux.agent-image --print-build-logs

      # Enforcement tests (issue #576): launch a real bwrap/OCI sandbox and
      # assert isolation holds from inside it, not just that the flags land on
      # argv. Gated behind the `integration` build tag and self-skipping when no
      # real runtime is usable, so a runner lacking user namespaces or a
      # container daemon degrades to a clean skip rather than a failure.
      - name: Runner sandbox integration tests
        run: nix develop -c bash -c 'cd cmd/launcher && go test -tags=integration -v ./internal/runner/...'
