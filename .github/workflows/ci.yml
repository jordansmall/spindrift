name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: flake check + image realize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      # Fork-friendly binary cache: /nix rides the GitHub Actions cache, so no
      # external service or credentials. PRs (including from forks) restore
      # from base/default-branch caches; a miss degrades to a cold build.
      - name: Restore and save the nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', 'go.sum') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G

      # shellcheck, the bats suite, and the eval-only equivalence checks.
      - name: nix flake check
        run: nix flake check --print-build-logs

      # Realize the Linux OCI image natively — the one thing the checks only
      # assert at eval time. On a Linux runner this needs no podman fallback.
      - name: Build the agent image
        run: nix build .#packages.x86_64-linux.agent-image --print-build-logs

      # Enforcement tests (issue #576): launch a real bwrap/OCI sandbox and
      # assert isolation holds from inside it, not just that the flags land on
      # argv. Gated behind the `integration` build tag and self-skipping when no
      # real runtime is usable, so a runner lacking user namespaces or a
      # container daemon degrades to a clean skip rather than a failure.
      #
      # Also covers the devShell-wrap PATH invariant (issue #798): a real
      # `nix develop` devShell naming neither git nor gh still leaves both
      # reachable to the wrapped command.
      - name: Runner sandbox integration tests
        run: nix develop -c bash -c 'cd cmd/launcher && go test -tags=integration -v ./internal/runner/... ./driver-exec/...'

  # spindrift's product is a Linux OCI box, so the image build and the
  # bwrap/OCI integration tests above are Linux-only and stay on the job
  # above. This job guards the other axis: the developer/consumer surface on
  # Apple Silicon (aarch64-darwin, a flake.nix system). It runs in parallel
  # with `check` — no `needs:` between them.
  check-macos:
    name: flake check (aarch64-darwin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      # Separate cache from the Linux job: primary-key already keys on
      # runner.os, so macOS and Linux never share or evict each other.
      - name: Restore and save the nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', 'go.sum') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-macos: 5G

      # On aarch64-darwin the OCI-image checks self-skip (the image module is
      # optionalAttrs-gated to Linux in nix/checks/default.nix), so this runs
      # the source-level checks — go test/vet/fmt, shellcheck, the bats suite
      # (driven through fakes, no real image), schema/equivalence/prompt eval —
      # natively. The launcher commands and skillsDir build from hostPkgs
      # (lib/mkHarness.nix), so no Linux builder is required.
      - name: nix flake check
        run: nix flake check --print-build-logs

      # Realize the consumer-facing CLI natively on Apple Silicon — the one
      # package a Mac consumer actually runs.
      - name: Build the spindrift CLI
        run: nix build .#packages.aarch64-darwin.spindrift --print-build-logs
